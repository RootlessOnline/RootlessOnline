---
# Role definitions
roles:
  harley:
    title: "CEO / Founder"
    authority_level: 3
    can_escalate: false  # Already at top
    description: "Final authority on all matters"
    
  z:
    title: "AI Manager / Coordinator"
    authority_level: 2
    can_escalate: true
    escalation_target: harley
    description: "Coordinates AI work, resolves Level 1-2 conflicts"
    
  research_ai:
    title: "Research Specialist"
    authority_level: 1
    can_escalate: true
    escalation_target: z
    description: "Gathers and synthesizes information"
    
  developer_ai:
    title: "Development Specialist"
    authority_level: 1
    can_escalate: true
    escalation_target: z
    description: "Implements projects and maintains code"
    
  crisis_ai:
    title: "Crisis Response"
    authority_level: 2
    can_escalate: true
    escalation_target: harley  # Direct line for emergencies
    description: "Handles urgent issues with minimal context"

---
# Conflict resolution authority
conflict_authority:
  level_1:  # Task/format conflicts
    resolver: z
    auto_resolve: true
    log_to: worklog.md
    
  level_2:  # Process/priority conflicts
    resolver: z
    auto_resolve: true
    requires_precedent: true
    log_to: decision_log.md
    
  level_3:  # Principle conflicts
    resolver: harley
    auto_resolve: false
    requires_adr: true
    log_to: decision_log.md

---
# Review budget
review_budget:
  harley_max_outputs_per_day: 5
  harley_max_level3_per_week: 3
  z_max_outputs_before_flag: 20

